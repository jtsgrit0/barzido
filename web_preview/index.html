<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clzido Google Map Preview</title>
    <style>
      :root {
        --surface: #ffffff;
        --ink: #18221f;
        --muted: #68736f;
        --primary: #0e7c66;
        --primary-soft: #d7f0e9;
        --line: #d8ddd7;
        --shadow: 0 10px 30px rgba(20, 30, 26, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      .app {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        margin: 0;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        position: relative;
        overflow: hidden;
        background: #e8ece9;
      }

      .map-frame {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .topbar {
        position: absolute;
        top: 18px;
        left: 16px;
        right: 16px;
        z-index: 10;
        display: grid;
        gap: 10px;
        max-width: 720px;
        margin: 0 auto;
      }

      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 52px;
        padding: 0 12px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--ink);
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
      }

      .segments {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .segment {
        min-height: 42px;
        border: 0;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
      }

      .segment.active {
        background: var(--primary);
        color: #ffffff;
      }

      .venue-list {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 116px;
        z-index: 10;
        display: flex;
        gap: 8px;
        max-width: 920px;
        margin: 0 auto;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .venue-chip {
        flex: 0 0 auto;
        max-width: 220px;
        min-height: 42px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        box-shadow: var(--shadow);
        cursor: pointer;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .venue-chip.active {
        border-color: var(--primary);
        background: var(--primary);
        color: #ffffff;
      }

      .fab-stack {
        position: absolute;
        right: 16px;
        bottom: 180px;
        z-index: 10;
        display: grid;
        gap: 10px;
      }

      .fab {
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 14px;
        background: var(--surface);
        color: var(--primary);
        box-shadow: var(--shadow);
        cursor: pointer;
        font-size: 18px;
      }

      .fab.active {
        background: var(--primary);
        color: #ffffff;
      }

      .sheet {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 10;
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        max-width: 720px;
        margin: 0 auto;
        padding: 14px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .avatar {
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border-radius: 8px;
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 22px;
      }

      .pub-info {
        min-width: 0;
      }

      .pub-name {
        overflow: hidden;
        margin: 0 0 4px;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 900;
      }

      .meta,
      .tags {
        overflow: hidden;
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tags {
        margin-top: 4px;
        color: var(--primary);
        font-weight: 700;
      }

      .provider-note {
        position: absolute;
        left: 16px;
        top: 130px;
        z-index: 10;
        max-width: 280px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .location-consent {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 20;
        max-width: 720px;
        margin: 0 auto;
        padding: 14px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .location-consent p {
        margin: 0;
        color: var(--ink);
        font-size: 14px;
        line-height: 1.45;
      }

      .location-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
      }

      .text-btn,
      .primary-btn {
        min-height: 38px;
        border-radius: 8px;
        padding: 0 12px;
        cursor: pointer;
        font-weight: 800;
      }

      .text-btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
      }

      .primary-btn {
        border: 0;
        background: var(--primary);
        color: #ffffff;
      }

      .location-status {
        position: absolute;
        left: 16px;
        top: 214px;
        z-index: 10;
        max-width: 280px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
        color: var(--ink);
        font-size: 12px;
        line-height: 1.35;
      }

      .route-panel {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 104px;
        z-index: 12;
        max-width: 720px;
        margin: 0 auto;
        padding: 12px 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: var(--shadow);
      }

      .route-panel p {
        margin: 0;
        color: var(--ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .route-title {
        margin-bottom: 4px;
        font-weight: 900;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 560px) {
        .provider-note {
          display: none;
        }

        .location-status {
          left: 12px;
          top: auto;
          bottom: 184px;
          max-width: calc(100% - 92px);
        }

        .venue-list {
          bottom: 156px;
        }

        .route-panel {
          bottom: 104px;
        }

        .sheet {
          grid-template-columns: 44px minmax(0, 1fr) auto;
        }

        .avatar {
          width: 44px;
          height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app">
      <iframe id="mapFrame" class="map-frame" title="Google map preview" loading="eager"></iframe>

      <section class="topbar" aria-label="Search and region controls">
        <div class="search">
          <span aria-hidden="true">Search</span>
          <input id="search" type="search" placeholder="Venue, mood, or tag" />
          <button id="searchButton" class="icon-btn" type="button" title="Search">-></button>
        </div>
        <div class="segments">
          <button class="segment active" type="button" data-region="hongdae">Hongdae</button>
          <button class="segment" type="button" data-region="itaewon">Itaewon</button>
        </div>
      </section>

      <aside class="provider-note">
        Google Maps iframe preview. Full custom markers need a Google Maps JavaScript API key.
      </aside>

      <aside id="locationStatus" class="location-status hidden"></aside>

      <section id="venueList" class="venue-list" aria-label="Visible venues"></section>

      <div class="fab-stack">
        <button id="openOnly" class="fab" type="button" title="Show verified open only">O</button>
        <button id="reset" class="fab" type="button" title="Reset region">R</button>
      </div>

      <section id="sheet" class="sheet" aria-label="Selected venue"></section>
      <section id="routePanel" class="route-panel hidden" aria-label="Route preview"></section>

      <section id="locationConsent" class="location-consent" aria-label="Location permission">
        <p>
          This mobile preview can use your current location to show where you are on the map and
          display walking directions inside the app. Your location is used only in this browser
          session.
        </p>
        <div class="location-actions">
          <button id="locationSkip" class="text-btn" type="button">Not now</button>
          <button id="locationAllow" class="primary-btn" type="button">Allow location</button>
        </div>
      </section>
    </main>

    <script>
      const regionCameras = {
        hongdae: { label: "Hongdae", center: [37.5537, 126.9235], zoom: 15 },
        itaewon: { label: "Itaewon", center: [37.5364, 126.9933], zoom: 15 },
      };

      const pubs = [
        { id: "hongdae-001", region: "hongdae", name: "Club FF", lat: 37.550275, lng: 126.922303, status: "Needs check", open: false, rating: "4.5", reviews: 0, tags: ["live-music", "indie-rock", "club"] },
        { id: "hongdae-002", region: "hongdae", name: "Rolling Hall", lat: 37.5497, lng: 126.9219, status: "Needs check", open: false, rating: "4.6", reviews: 0, tags: ["concert-hall", "live-music", "indie"] },
        { id: "hongdae-003", region: "hongdae", name: "KT&G Sangsangmadang Live Hall", lat: 37.5509, lng: 126.921, status: "Needs check", open: false, rating: "4.5", reviews: 0, tags: ["live-hall", "culture-space", "concert"] },
        { id: "hongdae-004", region: "hongdae", name: "Jebi Dabang", lat: 37.5479, lng: 126.9228, status: "Needs check", open: false, rating: "4.5", reviews: 0, tags: ["live-bar", "cafe", "indie-folk"] },
        { id: "hongdae-005", region: "hongdae", name: "Strange Fruit", lat: 37.556177, lng: 126.926671, status: "Needs check", open: false, rating: "4.5", reviews: 0, tags: ["live-music", "indie", "small-venue"] },
        { id: "hongdae-006", region: "hongdae", name: "Cafe Unplugged", lat: 37.5562, lng: 126.929, status: "Needs check", open: false, rating: "4.4", reviews: 0, tags: ["live-cafe", "acoustic", "open-mic"] },
        { id: "itaewon-001", region: "itaewon", name: "All That Jazz", lat: 37.5349, lng: 126.9972, status: "Needs check", open: false, rating: "4.6", reviews: 0, tags: ["jazz", "live-bar", "historic"] },
        { id: "itaewon-002", region: "itaewon", name: "Boogie Woogie", lat: 37.535, lng: 126.9941, status: "Needs check", open: false, rating: "4.4", reviews: 0, tags: ["live-music", "jazz", "soul"] },
        { id: "itaewon-003", region: "itaewon", name: "The Studio HBC", lat: 37.5412, lng: 126.9875, status: "Needs check", open: false, rating: "4.4", reviews: 0, tags: ["live-music", "rock", "performance"] },
        { id: "itaewon-004", region: "itaewon", name: "Southside Parlor", lat: 37.5328, lng: 126.9947, status: "Needs check", open: false, rating: "4.5", reviews: 0, tags: ["cocktail-bar", "live-music", "rooftop"] },
        { id: "itaewon-005", region: "itaewon", name: "Planet Hustle", lat: 37.5332, lng: 126.9915, status: "Needs check", open: false, rating: "4.4", reviews: 0, tags: ["bar", "hip-hop", "karaoke"] },
        { id: "itaewon-006", region: "itaewon", name: "Pet Sounds", lat: 37.539192, lng: 126.989004, status: "Needs check", open: false, rating: "4.6", reviews: 0, tags: ["rock-bar", "live-music", "requests"] },
      ];

      let region = "hongdae";
      let selectedId = "hongdae-001";
      let openOnly = false;
      let userLocation = null;
      let mapMode = "place";

      const mapFrame = document.querySelector("#mapFrame");
      const sheet = document.querySelector("#sheet");
      const search = document.querySelector("#search");
      const openOnlyButton = document.querySelector("#openOnly");
      const venueList = document.querySelector("#venueList");
      const locationConsent = document.querySelector("#locationConsent");
      const locationStatus = document.querySelector("#locationStatus");
      const routePanel = document.querySelector("#routePanel");

      function visiblePubs() {
        const query = search.value.trim().toLowerCase();
        return pubs.filter((pub) => {
          const haystack = [pub.name, pub.status, ...pub.tags].join(" ").toLowerCase();
          return pub.region === region && (!openOnly || pub.open) && (!query || haystack.includes(query));
        });
      }

      function googleMapUrl(pub) {
        if (pub) {
          const query = encodeURIComponent(`${pub.name} ${pub.lat},${pub.lng}`);
          return `https://www.google.com/maps?q=${query}&z=17&output=embed`;
        }
        const camera = regionCameras[region];
        return `https://www.google.com/maps?q=${camera.center[0]},${camera.center[1]}&z=${camera.zoom}&output=embed`;
      }

      function googleLocationUrl() {
        if (!userLocation) return googleMapUrl(null);
        return `https://www.google.com/maps?q=${userLocation.lat},${userLocation.lng}&z=17&output=embed`;
      }

      function distanceKm(from, to) {
        const earthRadiusKm = 6371;
        const dLat = ((to.lat - from.lat) * Math.PI) / 180;
        const dLng = ((to.lng - from.lng) * Math.PI) / 180;
        const fromLat = (from.lat * Math.PI) / 180;
        const toLat = (to.lat * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(fromLat) * Math.cos(toLat) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        return earthRadiusKm * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function renderRoutePanel(pub) {
        routePanel.classList.toggle("hidden", !userLocation || !pub || mapMode !== "route");
        if (!userLocation || !pub || mapMode !== "route") {
          routePanel.innerHTML = "";
          return;
        }

        const distance = distanceKm(userLocation, pub);
        const walkMinutes = Math.max(1, Math.round((distance / 4.5) * 60));
        routePanel.innerHTML = `
          <p class="route-title">In-app route preview</p>
          <p>From your current location to ${pub.name}</p>
          <p>Approx. ${distance.toFixed(2)} km · about ${walkMinutes} min on foot</p>
        `;
      }

      function renderList(current) {
        venueList.innerHTML = current
          .map(
            (pub) => `
              <button class="venue-chip ${pub.id === selectedId ? "active" : ""}" type="button" data-id="${pub.id}">
                ${pub.name}
              </button>
            `,
          )
          .join("");
      }

      function renderLocationStatus() {
        locationStatus.classList.toggle("hidden", !userLocation);
        if (!userLocation) {
          locationStatus.textContent = "";
          return;
        }

        locationStatus.innerHTML = `
          Location enabled<br />
          ${userLocation.lat.toFixed(5)}, ${userLocation.lng.toFixed(5)}
        `;
      }

      function renderSheet(selected) {
        sheet.classList.toggle("hidden", !selected);
        if (!selected) {
          sheet.innerHTML = "";
          return;
        }

        sheet.innerHTML = `
          <div class="avatar">♪</div>
          <div class="pub-info">
            <p class="pub-name">${selected.name}</p>
            <p class="meta">${selected.status} · ${selected.rating} · reviews ${selected.reviews}</p>
            <p class="tags">${selected.tags.slice(0, 3).join(" · ")}</p>
          </div>
          <button id="routeButton" class="primary-btn" type="button" title="Show route">
            Route
          </button>
        `;

        document.querySelector("#routeButton").addEventListener("click", () => {
          if (!userLocation) {
            locationConsent.classList.remove("hidden");
            return;
          }
          mapMode = "route";
          mapFrame.src = googleMapUrl(selected);
          renderRoutePanel(selected);
        });
      }

      function render() {
        document.querySelectorAll(".segment").forEach((button) => {
          button.classList.toggle("active", button.dataset.region === region);
        });
        openOnlyButton.classList.toggle("active", openOnly);

        const current = visiblePubs();
        if (!current.some((pub) => pub.id === selectedId)) {
          selectedId = current[0]?.id || "";
        }

        const selected = pubs.find((pub) => pub.id === selectedId);
        mapFrame.src = googleMapUrl(selected);
        renderList(current);
        renderSheet(selected);
        renderLocationStatus();
        renderRoutePanel(selected);
      }

      function moveToRegion(nextRegion) {
        region = nextRegion;
        selectedId = `${region}-001`;
        mapMode = "place";
        render();
      }

      document.querySelectorAll(".segment").forEach((button) => {
        button.addEventListener("click", () => moveToRegion(button.dataset.region));
      });

      venueList.addEventListener("click", (event) => {
        const chip = event.target.closest(".venue-chip");
        if (!chip) return;
        selectedId = chip.dataset.id;
        mapMode = "place";
        routePanel.classList.add("hidden");
        render();
      });

      openOnlyButton.addEventListener("click", () => {
        openOnly = !openOnly;
        render();
      });

      document.querySelector("#reset").addEventListener("click", () => moveToRegion(region));
      document.querySelector("#searchButton").addEventListener("click", render);
      search.addEventListener("input", render);

      document.querySelector("#locationSkip").addEventListener("click", () => {
        locationConsent.classList.add("hidden");
      });

      document.querySelector("#locationAllow").addEventListener("click", () => {
        if (!navigator.geolocation) {
          locationStatus.classList.remove("hidden");
          locationStatus.textContent = "This browser does not support geolocation.";
          locationConsent.classList.add("hidden");
          return;
        }

        locationStatus.classList.remove("hidden");
        locationStatus.textContent = "Requesting your current location...";

        navigator.geolocation.getCurrentPosition(
          (position) => {
            userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            };
            locationConsent.classList.add("hidden");
            mapMode = "location";
            mapFrame.src = googleLocationUrl();
            renderLocationStatus();
          },
          () => {
            locationStatus.classList.remove("hidden");
            locationStatus.textContent = "Location permission was denied or unavailable.";
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 60000,
          },
        );
      });

      render();
    </script>
  </body>
</html>
